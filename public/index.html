<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skite Ops</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <div id="login-view" class="login-screen hidden">
        <section class="login-card fade-in" aria-labelledby="login-title">
            <div class="login-brand">
                <span class="brand-mark">SO</span>
                <div>
                    <h1 id="login-title">Skite Ops</h1>
                    <p>Operations workspace</p>
                </div>
            </div>

            <form id="login-form" class="stack-form">
                <label class="field">
                    <span>Email Address</span>
                    <input type="email" id="email" class="form-control" required autocomplete="username">
                </label>
                <label class="field">
                    <span>Password</span>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </label>

                <div id="login-error" class="form-error" role="alert"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
        </section>
    </div>

    <div id="app-shell" class="app-shell hidden">
        <button type="button" class="mobile-scrim" id="mobile-scrim" aria-label="Close navigation"></button>

        <nav class="sidebar" id="sidebar" aria-label="Main navigation">
            <div class="sidebar-header">
                <span class="brand-mark small">SO</span>
                <span>Skite Ops</span>
            </div>
            <ul class="sidebar-menu" id="sidebar-menu"></ul>
        </nav>

        <header class="topbar">
            <button type="button" class="icon-btn mobile-menu-btn" id="btn-mobile-menu" aria-label="Open navigation">
                <i class="ph ph-list"></i>
            </button>
            <div class="page-kicker" id="page-kicker">Workspace</div>
            <div class="user-profile">
                <span class="user-role" id="user-role">Role</span>
                <span class="user-name" id="user-display-name">Loading...</span>
                <button type="button" class="btn btn-ghost" id="btn-logout">
                    <i class="ph ph-sign-out"></i>
                    <span>Logout</span>
                </button>
            </div>
        </header>

        <main class="content" id="app-content">
            <div id="module-container" class="module-container fade-in"></div>
        </main>
    </div>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    <div id="modal-root"></div>

    <script src="js/core/api.js?v=2"></script>
    <script src="js/core/auth.js?v=2"></script>
    <script src="js/core/ui.js?v=2"></script>
    <script src="js/core/navigation.js?v=10"></script>
    <script src="js/views/modules.js?v=10"></script>
    <script src="js/app.js?v=10"></script>
</body>
</html>
