<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skite Ops</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- LOGIN VIEW -->
    <div id="login-view" class="hidden">
        <div class="login-card fade-in">
            <h1>Skite Ops</h1>
            <p>Enter your operational credentials to continue.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </div>
                
                <div id="login-error" style="color: var(--brand-danger); font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>
                
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP SHELL -->
    <div id="app-shell" class="hidden">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                Skite Ops
            </div>
            <ul class="sidebar-menu" id="sidebar-menu">
                <!-- Dynamically populated by navigation.js -->
            </ul>
        </nav>

        <!-- Top Header -->
        <header class="topbar">
            <div class="user-profile">
                <span class="user-name" id="user-display-name">Loading...</span>
                <button type="button" class="btn-logout" id="btn-logout">
                    <i class="ph ph-sign-out"></i> Logout
                </button>
            </div>
        </header>

        <!-- Dynamic Module Content Area -->
        <main class="content">
            <div id="module-container" class="fade-in">
                <!-- Content injected here based on routing -->
                <h2 style="font-weight: 500; margin-bottom: 1rem; color: var(--gray-400);">Module View</h2>
                <div style="background: var(--bg-surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                    <p style="color: var(--text-muted);">Please select a module from the sidebar or wait for default routing.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript Core modules -->
    <script src="js/core/api.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/navigation.js"></script>
    
    <!-- Main App Orchestrator -->
    <script src="js/app.js"></script>
</body>
</html>
