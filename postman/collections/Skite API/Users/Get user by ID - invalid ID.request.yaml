$kind: http-request
name: 'Get user by ID - invalid ID'
method: GET
url: '{{baseUrl}}?route=user/get&user_id=abc'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has success false", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.false;
      });

      pm.test("Error message mentions user ID", function () {
          const json = pm.response.json();
          pm.expect(json.error.toLowerCase()).to.include('user id');
      });
