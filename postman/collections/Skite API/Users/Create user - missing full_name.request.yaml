$kind: http-request
name: 'Create user - missing full_name'
method: POST
url: '{{baseUrl}}/index.php?route=users/create'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "noname@example.com",
      "password": "securepass123",
      "role_id": 2
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has error status", function () {
          const json = pm.response.json();
          pm.expect(json.status).to.eql("error");
      });

      pm.test("Response contains message about full_name", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message.toLowerCase()).to.satisfy(function(msg) {
              return msg.includes("full_name") || msg.includes("name") || msg.includes("required");
          });
      });

      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
