$kind: http-request
name: 'Get user by ID - valid'
method: GET
url: '{{baseUrl}}?route=user/get&user_id={{createdUserId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success true", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });

      pm.test("User data is returned", function () {
          const json = pm.response.json();
          pm.expect(json.data).to.be.an('object');
          pm.expect(json.data).to.have.property('id');
          pm.expect(json.data).to.have.property('full_name');
          pm.expect(json.data).to.have.property('email');
      });

      pm.test("Password hash is not exposed", function () {
          const json = pm.response.json();
          pm.expect(json.data).to.not.have.property('password_hash');
      });
