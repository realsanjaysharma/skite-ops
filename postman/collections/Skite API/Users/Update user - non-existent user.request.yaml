$kind: http-request
name: 'Update user - non-existent user'
method: PUT
url: '{{baseUrl}}/index.php?route=users/update&id=999999'
order: 11000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "full_name": "Ghost User",
      "role_id": 2
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 404", function () {
          pm.response.to.have.status(404);
      });

      pm.test("Response has error status", function () {
          const json = pm.response.json();
          pm.expect(json.status).to.eql("error");
      });

      pm.test("Response contains not found message", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message.toLowerCase()).to.satisfy(function(msg) {
              return msg.includes("not found") || msg.includes("no user") || msg.includes("404");
          });
      });

      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
