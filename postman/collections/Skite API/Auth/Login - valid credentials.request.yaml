$kind: http-request
name: 'Login - valid credentials'
method: POST
url: '{{baseUrl}}?route=auth/login'
order: 1000
body:
  type: formdata
  content:
    - key: email
      type: text
      value: admin@skite.com
    - key: password
      type: text
      value: password123
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response has success true', function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });

      pm.test('Response contains data object', function () {
          const json = pm.response.json();
          pm.expect(json.data).to.be.an('object');
      });

      pm.test('Data has required user fields', function () {
          const data = pm.response.json().data;
          pm.expect(data).to.have.property('id');
          pm.expect(data).to.have.property('email');
          pm.expect(data).to.have.property('full_name');
          pm.expect(data).to.have.property('role_id');
      });

      pm.test('Response time is less than 2000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });