$kind: http-request
name: 'Login - invalid password'
method: POST
url: '{{baseUrl}}?route=auth/login'
order: 3000
body:
  type: formdata
  content:
    - key: email
      type: text
      value: admin@skite.com
    - key: password
      type: text
      value: wrongpassword
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });

      pm.test('Response has success false', function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.false;
      });

      pm.test('Response contains error about invalid credentials', function () {
          const json = pm.response.json();
          pm.expect(json.error.toLowerCase()).to.satisfy(function (msg) {
              return msg.includes('invalid') || msg.includes('password') || msg.includes('credentials');
          });
      });

      pm.test('Response time is less than 2000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });